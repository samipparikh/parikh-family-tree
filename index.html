<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parikh Family Tree</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="header">
        <h1>Parikh Family Tree</h1>
        <div id="controls">
            <button id="btn-paternal" class="active">Paternal Side (Parikh)</button>
            <button id="btn-maternal">Maternal Side (Contractor)</button>
            <button id="btn-both">Both Sides</button>
            <span class="zoom-group">
                <button id="btn-zoom-out">−</button>
                <span id="zoom-level">100%</span>
                <button id="btn-zoom-in">+</button>
                <select id="zoom-select">
                    <option value="0.25">25%</option>
                    <option value="0.5">50%</option>
                    <option value="0.75">75%</option>
                    <option value="1" selected>100%</option>
                    <option value="1.5">150%</option>
                    <option value="2">200%</option>
                    <option value="3">300%</option>
                </select>
            </span>
            <button id="btn-reset">Reset View</button>
        </div>
    </div>
    <div id="tree-container">
        <svg id="tree-svg"></svg>
    </div>
    <div id="tooltip" class="hidden"></div>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="family-data.js"></script>
    <script src="app.js"></script>
</body>
</html>
